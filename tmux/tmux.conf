# ~/.tmux.conf — professional, minimal, backend-friendly.
# ---------------------------------------------------------------------------

# --- Prefix: Ctrl-a (easier than Ctrl-b, doesn't clash with shell C-a) ----
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- General --------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # truecolor
set -g mouse on                              # scroll, select panes, resize
set -g history-limit 50000                   # big scrollback
set -sg escape-time 10                       # snappier ESC (nvim-friendly)
set -g focus-events on
set -g base-index 1                          # windows start at 1
setw -g pane-base-index 1                    # panes start at 1
set -g renumber-windows on                   # keep window numbers contiguous
set -g set-clipboard on

# --- Vi keybindings in copy-mode + macOS clipboard integration ------------
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"

# --- Splits: intuitive | and - , open in current path --------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
bind c new-window -c "#{pane_current_path}"

# --- Pane navigation: prefix + h/j/k/l ------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Pane resize: prefix + H/J/K/L (repeatable) ---------------------------
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Window navigation: Shift-arrow, no prefix ----------------------------
bind -n S-Left  previous-window
bind -n S-Right next-window

# --- Reload config: prefix + r --------------------------------------------
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# --- Status bar: clean, matches the starship palette ----------------------
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=default,fg=white"
set -g status-left-length 30
set -g status-right-length 80
set -g status-left  "#[fg=green,bold] #S #[default]"
set -g status-right "#[fg=cyan]#(whoami)@#h #[fg=yellow]%Y-%m-%d #[fg=white]%H:%M "
setw -g window-status-current-format "#[fg=black,bg=cyan,bold] #I:#W "
setw -g window-status-format "#[fg=white] #I:#W "
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=cyan"
set -g message-style "bg=cyan,fg=black"

# --- Plugins (TPM) --------------------------------------------------------
# Install TPM once:  git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then inside tmux:  prefix + I  (capital i) to fetch plugins.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'   # save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'   # auto-save every 15m
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

# Keep this line at the very bottom.
run '~/.tmux/plugins/tpm/tpm'
