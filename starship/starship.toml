# starship.toml — minimal, backend/cloud-native prompt.
# Two lines: context on top, a clean prompt char below. Only modules that
# carry signal for backend work are enabled; everything else is off.
# Requires a Nerd Font (JetBrains Mono Nerd Font is installed).

add_newline = true
command_timeout = 1000

format = """
$directory\
$git_branch\
$git_status\
$golang\
$python\
$nodejs\
$docker_context\
$kubernetes\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"     # turns red on non-zero exit code
vimcmd_symbol  = "[❮](bold green)"

[directory]
style = "bold cyan"
truncation_length = 4
truncate_to_repo = true
read_only = " "

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold yellow"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
modified = "!${count}"
staged = "+${count}"
stashed = "*${count}"
deleted = "✘${count}"

[cmd_duration]
min_time = 2000            # only show when a command took >2s
format = "[ ﮫ $duration]($style) "
style = "bold yellow"

# --- Language versions: shown only inside relevant projects ---------------
[golang]
symbol = " "
style = "bold cyan"
format = "[$symbol($version )]($style)"

[python]
symbol = " "
style = "bold yellow"
# Show the active version + virtualenv name when present.
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

[nodejs]
symbol = " "
style = "bold green"
format = "[$symbol($version )]($style)"
# Don't light up in every dir — only when node files are present.
detect_extensions = ["js", "mjs", "cjs", "ts", "tsx"]
detect_files = ["package.json", ".node-version", ".nvmrc"]

# --- Infra context --------------------------------------------------------
[docker_context]
symbol = " "
style = "bold blue"
format = "[$symbol$context]($style) "
only_with_files = true     # only when a Dockerfile/compose file is around

[kubernetes]
disabled = false           # backend engineers want this always visible
symbol = "☸ "
style = "bold blue"
format = '[$symbol$context( \($namespace\))]($style) '

# --- Explicitly disabled noise --------------------------------------------
[package]
disabled = true
[aws]
disabled = true
[gcloud]
disabled = true
[hostname]
disabled = true
[username]
disabled = true
